    <g transform="translate(106 206)">
      <rect x="0" y="0" width="204" height="70" rx="6" fill="#17222c" stroke="#70808a"/>
      <text class="tiny-light" x="18" y="28">COLOR</text>
      <rect class="mint-soft" x="18" y="40" width="22" height="20"/>
      <rect fill="#fbf6eb" stroke="#d8d0c0" x="52" y="40" width="22" height="20"/>
      <rect class="coral" x="86" y="40" width="22" height="20"/>
      <rect class="amber" x="120" y="40" width="22" height="20"/>
