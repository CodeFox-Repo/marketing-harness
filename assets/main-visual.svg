  <path class="line" d="M1172 374 C1218 374 1218 392 1264 392"/>
  <path class="line" d="M1172 374 C1218 374 1218 556 1264 556"/>
  <circle class="mint-soft" cx="1172" cy="374" r="16"/>
  <circle class="mint-soft" cx="1264" cy="228" r="16"/>
