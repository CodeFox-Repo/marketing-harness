<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Marketing asset workflow main visual</title>
  <desc id="desc">A technical visual showing locked rules resolving producer skills into accepted campaign assets.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ded8ca" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#0d151d" flood-opacity="0.16"/>
    </filter>
    <style>
      .bg { fill: #f7f2e7; }
      .grid { fill: url(#grid); }
      .ink { fill: #111820; }
      .panel { fill: #121a22; stroke: #0d151d; stroke-width: 3; }
      .paper { fill: #fbf6eb; stroke: #111820; stroke-width: 3; }
      .mint { fill: #36d8a4; }
      .mint-soft { fill: #dff5ec; stroke: #75bea4; stroke-width: 2; }
      .amber { fill: #ffb21a; }
      .coral { fill: #ec4860; }
      .line { fill: none; stroke: #45c69f; stroke-width: 10; stroke-linecap: round; }
      .line-dark { fill: none; stroke: #111820; stroke-width: 3; stroke-linecap: round; }
      .hair { fill: none; stroke: #83919a; stroke-width: 2; }
      .label { fill: #111820; font: 700 22px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .04em; }
      .small { fill: #111820; font: 600 15px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .03em; }
      .small-light { fill: #e9f4ef; font: 600 15px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .03em; }
      .tiny { fill: #68747c; font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .tiny-light { fill: #aebbc4; font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect class="grid" x="42" y="42" width="1516" height="816"/>
  <rect x="58" y="56" width="1484" height="788" rx="22" fill="none" stroke="#111820" stroke-width="3"/>

  <text class="small" x="92" y="106">INPUT: LOCKED RULES</text>
  <text class="small" x="646" y="106">RESOLVE: CAPABILITIES TO APPROVED SKILLS</text>
  <text class="small" x="1240" y="106">OUTPUT: ACCEPTED ASSETS</text>

  <g filter="url(#shadow)">
