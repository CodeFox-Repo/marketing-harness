      <path class="hair" d="M154 16h36"/>
      <rect x="206" y="0" width="152" height="32" rx="5" fill="#17222c" stroke="#9eb2ba"/>
      <text class="tiny-light" x="220" y="21">presentations</text>
      <rect x="374" y="0" width="88" height="32" rx="5" fill="#2c2307" stroke="#ffb21a"/>
      <text fill="#ffcf6d" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="700" x="390" y="21">APPROVED</text>
